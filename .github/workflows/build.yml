name: Build Zygisk Device Spoof

on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build v${{ github.ref_name }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK & NDK
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk/cmdline-tools
          curl -sL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o cmdline.zip
          unzip -q cmdline.zip && rm cmdline.zip
          mv cmdline-tools latest
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;27.0.12077973" \
            "cmake;3.22.1"

      - name: Setup local.properties
        run: |
          echo "sdk.dir=$HOME/android-sdk" > local.properties
          echo "ndk.dir=$HOME/android-sdk/ndk/27.0.12077973" >> local.properties

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build Release ZIP
        run: ./gradlew :module:zipRelease

      - name: Build Debug ZIP
        run: ./gradlew :module:zipDebug

      - name: Upload Release ZIP
        uses: actions/upload-artifact@v4
        with:
          name: zygisk_device_spoof_release_${{ github.ref_name }}
          path: module/release/zygisk_device_spoof_release.zip
          if-no-files-found: warn

      - name: Upload Debug ZIP
        uses: actions/upload-artifact@v4
        with:
          name: zygisk_device_spoof_debug_${{ github.ref_name }}
          path: module/release/zygisk_device_spoof_debug.zip
          if-no-files-found: warn
